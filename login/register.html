<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">

        <div class="soft-card">

            <div class="comfort-header">
                <h1 class="comfort-title">Hiiiiiiiiiiiii </h1>
                <p class="gentle-subtitle">
                    Buat akun agar dapat diskon
                </p>
            </div>

            <!-- REGISTER FORM -->
            <form class="comfort-form" id="registerForm" novalidate>

                <!-- USERNAME -->
                <div class="soft-field">

                    <div class="field-container">

                        <input
                            type="text"
                            id="username"
                            name="username"
                            required
                            autocomplete="username">

                        <label for="username">
                            Nama Pengguna
                        </label>

                        <div class="field-accent"></div>

                    </div>

                    <span class="gentle-error" id="usernameError"></span>

                </div>

                <!-- EMAIL -->
                <div class="soft-field">

                    <div class="field-container">

                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            autocomplete="email">

                        <label for="email">
                            Email Address
                        </label>

                        <div class="field-accent"></div>

                    </div>

                    <span class="gentle-error" id="emailError"></span>

                </div>

                <!-- PASSWORD -->
                <div class="soft-field">

                    <div class="field-container">

                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            autocomplete="new-password">

                        <label for="password">
                            Password
                        </label>

                        <!-- TOGGLE PASSWORD -->
                        <button
                            type="button"
                            class="gentle-toggle"
                            id="passwordToggle"
                            aria-label="Toggle password visibility">

                            0

                        </button>

                        <div class="field-accent"></div>

                    </div>

                    <span class="gentle-error" id="passwordError"></span>

                </div>

                <!-- CHECKBOX -->
                <div class="comfort-options">

                    <label class="gentle-checkbox">

                        <input
                            type="checkbox"
                            id="remember"
                            name="remember"
                            required>

                        <span class="checkbox-text">
                            Saya setuju
                        </span>

                    </label>

                    <a href="#" class="comfort-link">
                        S&K
                    </a>

                </div>

                <!-- BUTTON -->
                <button type="submit" class="comfort-button">

                    <span class="button-text">
                        Buat Akun
                    </span>

                </button>

                <!-- MESSAGE -->
                <p id="message"></p>

            </form>

            <!-- LOGIN -->
            <div class="comfort-signup">

                <span class="signup-text">
                    Udah punya akun?
                </span>

                <a
                    href="index.html"
                    class="comfort-link signup-link">

                    Sign In

                </a>

            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="js/register.js"></script>

</body>
</html>
